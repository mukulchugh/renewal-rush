# Netlify deploy config for Renewal Rush (Babylon.js + Vite static build).
# The game lives in the monorepo subdir game-lab/app and builds to dist/ (static).
[build]
  base    = "game-lab/app"   # run the build from the game dir
  command = "bun run build"  # Netlify's build image ships bun; bun.lock triggers it
  publish = "dist"           # relative to base → game-lab/app/dist

# CDN-edge caching layer. The real cross-host guarantee is the service worker
# (public/sw.js, CacheFirst on heavy media) — these headers just help first paint
# and edge caching ON Netlify; an equivalent vercel.json block (or none at all,
# leaning on the SW) works the same elsewhere. Trailing /prefix/* is recursive,
# so /assets/* covers both the hashed JS AND the nested texture dirs
# (/assets/<set>/*.jpg). The textures + models are NOT content-hashed, so to ship
# an updated one, rename the file (bump the SW CACHE_VERSION too) to bust caches.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Models/HDR/GLB live under /models/ (flat) and /models/cars/ (nested) — was the
# gap: previously uncached, so sky.hdr (5 MB) + the GLBs revalidated every visit.
[[headers]]
  for = "/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the entry HTML — it points at the hashed bundle, must stay fresh.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    # Allow embedding the game in an <iframe> on quivly.ai (it's built with base:"./").
    Content-Security-Policy = "frame-ancestors 'self' https://*.quivly.ai https://quivly.ai"
